name: performance-book

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch:

concurrency:
  group: performance-book-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  perf-book-pr:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'build-perf-book') }}
    name: linux-pr
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3

      - name: Install sasktran2
        run: pixi run pip install --no-build-isolation .

      - name: Build Book
        id: benchmark
        run: pixi run make -C docs/performance_book html

      - uses: actions/upload-artifact@v6
        with:
          name: performance_book
          path: docs/performance_book/build/html

  perf-book-main:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'build-perf-book') }}
    name: linux-main
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: main-source
          ref: main

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3

      - name: Install sasktran2
        run: pixi run pip install --no-build-isolation ./main-source

      - name: Build Book
        id: benchmark
        run: pixi run make -C docs/performance_book html

      - uses: actions/upload-artifact@v6
        with:
          name: performance_book_main
          path: docs/performance_book/build/html
